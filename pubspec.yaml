name: trust_wallet_demo
description: A premium crypto wallet demo inspired by modern wallet UX.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.69.2
  lottie: ^3.1.3
  flutter_svg: ^2.0.17
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.2
  animations: ^2.0.11
  google_fonts: ^6.2.1
  animated_text_kit: ^4.2.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mock/
    - assets/svg/
    - assets/lottie/
