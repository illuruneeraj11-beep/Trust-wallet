<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Trust Wallet — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0A0A0A;color:#fff;min-height:100vh;padding:28px 24px 60px;}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.topbar h1{font-size:22px;font-weight:800;}
.conn-badge{display:flex;align-items:center;gap:7px;background:#00FFA310;border:1px solid #00FFA330;color:#00FFA3;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.conn-badge .dot{width:7px;height:7px;border-radius:50%;background:#00FFA3;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:1060px;}
.span2{grid-column:1/-1;}
@media(max-width:720px){.grid{grid-template-columns:1fr;}.span2{grid-column:1;}}

/* ── Cards ── */
.card{background:#111;border:1px solid #1E1E1E;border-radius:18px;padding:22px;}
.card-hdr{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;margin-bottom:20px;}
.card-hdr .ico{font-size:19px;}

/* ── Balance display ── */
.bal-big{font-size:40px;font-weight:800;color:#00FFA3;line-height:1;margin:4px 0;}
.bal-label{font-size:13px;color:#636366;margin-bottom:16px;}
.divider{border:none;border-top:1px solid #1E1E1E;margin:18px 0;}

/* ── Form fields ── */
label{display:block;font-size:11px;font-weight:700;color:#636366;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
input,select,textarea{
  width:100%;padding:11px 13px;border:1.5px solid #222;border-radius:10px;
  background:#0D0D0D;color:#fff;font-size:14px;font-family:inherit;outline:none;
  transition:border-color .15s;
}
input:focus,select:focus{border-color:#00FFA3;}
select option{background:#111;}
.field{margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── Buttons ── */
.btn{
  width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;font-family:inherit;
  transition:opacity .12s,transform .1s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn:active{opacity:.75;transform:scale(.98);}
.btn-green{background:#00FFA3;color:#000;}
.btn-dark{background:#1C1C1E;color:#fff;}
.btn-red{background:#EA394320;color:#EA3943;border:1.5px solid #EA394330;}
.btn-sm{width:auto;padding:7px 14px;font-size:12px;}

/* ── TX list ── */
.tx-scroll{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.tx-item{background:#1A1A1A;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.tx-item .txico{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:15px;flex-shrink:0;}
.tx-item .meta{flex:1;min-width:0;}
.tx-item .meta .name{font-size:14px;font-weight:700;}
.tx-item .meta .sub{font-size:11px;color:#636366;margin-top:2px;}
.tx-item .right{text-align:right;}
.tx-item .right .val{font-size:14px;font-weight:700;}
.tx-item .right .dt{font-size:11px;color:#636366;margin-top:2px;}
.del-btn{width:28px;height:28px;border-radius:8px;background:#EA394320;border:none;cursor:pointer;color:#EA3943;font-size:13px;display:grid;place-items:center;}

/* ── Status pill ── */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.pill-green{background:#00FFA315;color:#00FFA3;}
.pill-yellow{background:#F0A50020;color:#F0A500;}

/* ── Toast ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  padding:11px 22px;border-radius:20px;font-size:13px;font-weight:700;
  z-index:9999;transition:opacity .3s;
}
.toast.ok{background:#001A10;color:#00FFA3;border:1px solid #00FFA320;}
.toast.err{background:#1A0505;color:#EA3943;border:1px solid #EA394330;}
.toast.hidden{opacity:0;}
</style>
</head>
<body>

<div class="topbar">
  <h1>🛡️ Trust Wallet Admin</h1>
  <div class="conn-badge"><span class="dot"></span> Supabase Connected</div>
</div>

<div class="grid">
  <!-- ══════════ WALLET BALANCE ══════════ -->
  <div class="card">
    <div class="card-hdr"><span class="ico">💰</span> Wallet Balance</div>
    <div class="bal-big" id="disp-bal">$0.00</div>
    <div class="bal-label" id="disp-name">Main Wallet</div>

    <div class="field">
      <label>Wallet Balance (Numeric)</label>
      <input type="number" id="inp-bal" placeholder="12450.00" step="0.01"/>
    </div>
    <div class="field">
      <label>Wallet Name</label>
      <input type="text" id="inp-name" placeholder="Main Wallet"/>
    </div>
    <button class="btn btn-green" onclick="updateBalance()">💾 Update Balance</button>
  </div>

  <!-- ══════════ ADD TRANSACTION ══════════ -->
  <div class="card">
    <div class="card-hdr"><span class="ico">➕</span> Add Transaction</div>
    <div class="row2">
      <div class="field">
        <label>Type</label>
        <select id="tx-type">
          <option value="receive">↙ Receive</option>
          <option value="send">↗ Send</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="tx-status">
          <option value="completed">✅ Completed</option>
          <option value="pending">⏳ Pending</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Symbol</label>
        <input type="text" id="tx-sym" placeholder="BNB" oninput="this.value=this.value.toUpperCase()"/>
      </div>
      <div class="field">
        <label>Amount (Numeric)</label>
        <input type="number" id="tx-amt" placeholder="1.25" step="any"/>
      </div>
    </div>
    <div class="field">
      <label>To/From Address (optional)</label>
      <input type="text" id="tx-addr" placeholder="0x..."/>
    </div>
    <button class="btn btn-green" onclick="addTransaction()">➕ Add Transaction</button>
  </div>

  <!-- ══════════ HISTORY ══════════ -->
  <div class="card span2">
    <div class="card-hdr">🕒 Recent Transactions</div>
    <div class="tx-scroll" id="tx-list">
      <div style="padding:20px;text-align:center;color:#636366;">Loading...</div>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE);
let _walletId = null;

async function init() {
  const { data, error } = await sb.from('wallets').select('*').limit(1).maybeSingle();
  if (data) {
    _walletId = data.id;
    const bal = parseFloat(data.balance || data.total_balance_usd || 0);
    document.getElementById('disp-bal').textContent = '$' + bal.toLocaleString();
    document.getElementById('disp-name').textContent = data.wallet_name || 'Main Wallet';
    document.getElementById('inp-bal').value = bal;
    document.getElementById('inp-name').value = data.wallet_name || 'Main Wallet';
  }
  loadHistory();
}

async function updateBalance() {
  const balance = parseFloat(document.getElementById('inp-bal').value);
  const name = document.getElementById('inp-name').value;
  if (!_walletId) return toast('Wallet not found','err');

  const { error } = await sb.from('wallets').update({ 
    balance, 
    wallet_name: name,
    updated_at: new Date().toISOString()
  }).eq('id', _walletId);

  if (error) toast(error.message, 'err');
  else { toast('Balance Updated!', 'ok'); init(); }
}

async function addTransaction() {
  const type = document.getElementById('tx-type').value;
  const status = document.getElementById('tx-status').value;
  const sym = document.getElementById('tx-sym').value;
  const amt = parseFloat(document.getElementById('tx-amt').value);
  const addr = document.getElementById('tx-addr').value;

  if (!sym || isNaN(amt)) return toast('Fill all fields', 'err');

  const { error } = await sb.from('transactions').insert({
    wallet_id: _walletId,
    type,
    status,
    asset_symbol: sym,
    amount: amt,
    to_address: type === 'send' ? addr : null,
    from_address: type === 'receive' ? addr : null
  });

  if (error) toast(error.message, 'err');
  else { toast('TX Added!', 'ok'); loadHistory(); }
}

async function loadHistory() {
  const { data } = await sb.from('transactions').select('*').order('created_at', { ascending: false });
  const el = document.getElementById('tx-list');
  if (!data || data.length === 0) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#636366;">No TXs</div>'; return; }

  el.innerHTML = data.map(tx => `
    <div class="tx-item">
      <div class="txico" style="background:${tx.type==='receive'?'#00FFA318':'#EA394318'};color:${tx.type==='receive'?'#00FFA3':'#EA3943'};">${tx.type==='receive'?'↙':'↗'}</div>
      <div class="meta">
        <div class="name">${tx.type.toUpperCase()} ${tx.asset_symbol}</div>
        <div class="sub">${tx.status}</div>
      </div>
      <div class="right">
        <div class="val">${tx.type==='receive'?'+':'-'}${tx.amount}</div>
        <div class="dt">${new Date(tx.created_at).toLocaleDateString()}</div>
      </div>
      <button class="del-btn" onclick="deleteTx('${tx.id}')">✕</button>
    </div>
  `).join('');
}

async function deleteTx(id) {
  await sb.from('transactions').delete().eq('id', id);
  loadHistory();
}

function toast(m, t) {
  const e = document.getElementById('toast');
  e.textContent = m; e.className = `toast ok ${t}`; e.classList.remove('hidden');
  setTimeout(() => e.classList.add('hidden'), 2000);
}

init();
</script>
</body>
</html>
